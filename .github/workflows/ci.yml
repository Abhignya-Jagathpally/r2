name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          # R/GSVA not installed in CI — GSVA-dependent tests will be skipped.
          # ssGSEA (gseapy) fallback is tested instead.
          SKIP_R_TESTS: "1"
        run: |
          pytest tests/ -v --tb=short -x -k "not gsva"

      - name: Validate pipeline config
        run: |
          python -c "from src.utils.config import load_config; load_config('config/pipeline_config.yaml')"

      - name: Dry run pipeline
        run: |
          python main.py --dry-run
